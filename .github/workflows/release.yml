name: Release

on:
  workflow_dispatch:
    inputs:
      verify-lock-closure:
        description: "Run resolver drift check (tools/natives/refresh-lock-closure.sh --check)"
        required: false
        type: boolean
        default: false

jobs:
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - classifier: linux-x86_64
            os: ubuntu-24.04
          - classifier: linux-aarch64
            os: ubuntu-24.04-arm
          - classifier: osx-x86_64
            os: macos-15-intel
          - classifier: osx-aarch64
            os: macos-15
          - classifier: windows-x86_64
            os: windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Install conda-package-handling
        shell: bash
        run: |
          python -m pip install --user conda-package-handling
          USER_BASE="$(python -m site --user-base)"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$USER_BASE/Scripts" >> "$GITHUB_PATH"
          else
            echo "$USER_BASE/bin" >> "$GITHUB_PATH"
          fi

      - name: Make scripts executable
        shell: bash
        run: chmod +x ./gradlew tools/natives/*.sh

      - name: Validate lock file
        shell: bash
        run: tools/natives/verify-lock.sh

      - name: Validate lock closure
        if: ${{ inputs.verify-lock-closure }}
        shell: bash
        run: tools/natives/refresh-lock-closure.sh --check

      - name: Install patchelf (Linux only)
        if: startsWith(matrix.classifier, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Stage native payload
        shell: bash
        run: tools/natives/fetch-and-stage.sh ${{ matrix.classifier }}

      - name: Audit runtime dependencies
        shell: bash
        run: tools/natives/audit-runtime-deps.sh ${{ matrix.classifier }}

      - name: Assemble natives jars
        shell: bash
        run: ./gradlew :gdal-ffm-natives:assemble

      - name: Run packaged smoke (standard)
        if: startsWith(matrix.classifier, 'linux-') || startsWith(matrix.classifier, 'osx-')
        shell: bash
        run: |
          set -euo pipefail
          matches=()
          while IFS= read -r path; do
            [[ -n "$path" ]] && matches+=("$path")
          done < <(
            find gdal-ffm-natives/build/libs -maxdepth 1 -type f \
              -name "gdal-ffm-natives-*-natives-${{ matrix.classifier }}.jar" \
              ! -name "gdal-ffm-natives-swiss-*" \
              | sort
          )
          if [[ ${#matches[@]} -ne 1 ]]; then
            echo "Expected exactly one standard native jar for classifier ${{ matrix.classifier }}, found ${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2 || true
            exit 1
          fi
          jar_path="$(pwd)/${matches[0]}"
          shared_tmpdir="$(pwd)/gdal-ffm-core/build/tmp/smoke/${{ matrix.classifier }}-shared"
          ./gradlew :gdal-ffm-core:smokeTestPackagedNative \
            -PgdalFfmSmokeNativeJar="$jar_path" \
            -PgdalFfmSmokeLabel="${{ matrix.classifier }}-standard" \
            -PgdalFfmSmokeTmpDir="$shared_tmpdir"

      - name: Run packaged smoke (swiss)
        if: startsWith(matrix.classifier, 'linux-') || startsWith(matrix.classifier, 'osx-')
        shell: bash
        run: |
          set -euo pipefail
          matches=()
          while IFS= read -r path; do
            [[ -n "$path" ]] && matches+=("$path")
          done < <(
            find gdal-ffm-natives/build/libs -maxdepth 1 -type f \
              -name "gdal-ffm-natives-swiss-*-natives-${{ matrix.classifier }}.jar" \
              | sort
          )
          if [[ ${#matches[@]} -ne 1 ]]; then
            echo "Expected exactly one swiss native jar for classifier ${{ matrix.classifier }}, found ${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2 || true
            exit 1
          fi
          jar_path="$(pwd)/${matches[0]}"
          shared_tmpdir="$(pwd)/gdal-ffm-core/build/tmp/smoke/${{ matrix.classifier }}-shared"
          ./gradlew :gdal-ffm-core:smokeTestPackagedNative \
            -PgdalFfmSmokeNativeJar="$jar_path" \
            -PgdalFfmSmokeLabel="${{ matrix.classifier }}-swiss" \
            -PgdalFfmSmokeTmpDir="$shared_tmpdir"

      - name: Upload classifier artifact (standard)
        uses: actions/upload-artifact@v4
        with:
          name: gdal-ffm-natives-${{ matrix.classifier }}
          path: gdal-ffm-natives/build/libs/gdal-ffm-natives-*-natives-${{ matrix.classifier }}.jar

      - name: Upload classifier artifact (swiss)
        uses: actions/upload-artifact@v4
        with:
          name: gdal-ffm-natives-swiss-${{ matrix.classifier }}
          path: gdal-ffm-natives/build/libs/gdal-ffm-natives-swiss-*-natives-${{ matrix.classifier }}.jar

  publish:
    needs: build-natives
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Make gradlew executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Download native release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gdal-ffm-natives*
          merge-multiple: true
          path: gdal-ffm-natives/build/libs

      - name: Resolve project version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version=//p' gradle.properties | head -n1)"
          if [[ -z "$version" ]]; then
            echo "Could not resolve project version from gradle.properties" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Verify downloaded native jars
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          classifiers=(
            "linux-x86_64"
            "linux-aarch64"
            "osx-x86_64"
            "osx-aarch64"
            "windows-x86_64"
          )
          default_min_size_bytes=$((100 * 1024 * 1024))
          windows_min_size_bytes=$((30 * 1024 * 1024))

          actual="$(find gdal-ffm-natives/build/libs -maxdepth 1 -type f -name '*.jar' | wc -l | tr -d ' ')"
          if [[ "$actual" -ne 10 ]]; then
            echo "Expected exactly 10 native jars (5 standard + 5 swiss), got $actual" >&2
            find gdal-ffm-natives/build/libs -maxdepth 1 -type f -name '*.jar' -print | sort >&2 || true
            exit 1
          fi

          for classifier in "${classifiers[@]}"; do
            min_size_bytes="$default_min_size_bytes"
            if [[ "$classifier" == windows-* ]]; then
              min_size_bytes="$windows_min_size_bytes"
            fi
            for prefix in "gdal-ffm-natives" "gdal-ffm-natives-swiss"; do
              jar="gdal-ffm-natives/build/libs/${prefix}-${version}-natives-${classifier}.jar"
              if [[ ! -f "$jar" ]]; then
                echo "Missing expected native jar: $jar" >&2
                exit 1
              fi
              size_bytes="$(wc -c < "$jar" | tr -d ' ')"
              if (( size_bytes < min_size_bytes )); then
                echo "Native jar too small: $jar (${size_bytes} bytes, expected >= ${min_size_bytes})" >&2
                exit 1
              fi
            done
          done

          find gdal-ffm-natives/build/libs -maxdepth 1 -type f -name '*.jar' -print | sort

      - name: Publish artifacts
        env:
          MAVEN_REPOSITORY_URL: ${{ secrets.MAVEN_REPOSITORY_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        shell: bash
        run: |
          ./gradlew \
            :gdal-ffm-core:check \
            :gdal-ffm-natives:check \
            :gdal-ffm-core:publishMavenJavaPublicationToReleaseTargetRepository \
            :gdal-ffm-natives:publishNativesPublicationToReleaseTargetRepository \
            :gdal-ffm-natives:publishNativesSwissPublicationToReleaseTargetRepository \
            -x :gdal-ffm-natives:nativesJarLinuxX8664 \
            -x :gdal-ffm-natives:nativesJarLinuxAarch64 \
            -x :gdal-ffm-natives:nativesJarOsxX8664 \
            -x :gdal-ffm-natives:nativesJarOsxAarch64 \
            -x :gdal-ffm-natives:nativesJarWindowsX8664 \
            -x :gdal-ffm-natives:nativesSwissJarLinuxX8664 \
            -x :gdal-ffm-natives:nativesSwissJarLinuxAarch64 \
            -x :gdal-ffm-natives:nativesSwissJarOsxX8664 \
            -x :gdal-ffm-natives:nativesSwissJarOsxAarch64 \
            -x :gdal-ffm-natives:nativesSwissJarWindowsX8664

      - name: Verify published artifacts in Maven repository
        env:
          MAVEN_REPOSITORY_URL: ${{ secrets.MAVEN_REPOSITORY_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          PROJECT_VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import os
          import pathlib
          import sys
          import urllib.request
          import xml.etree.ElementTree as ET

          repo_url = (os.environ.get("MAVEN_REPOSITORY_URL") or "").rstrip("/")
          username = os.environ.get("MAVEN_USERNAME") or ""
          password = os.environ.get("MAVEN_PASSWORD") or ""
          version = os.environ["PROJECT_VERSION"]

          if not repo_url:
            print("MAVEN_REPOSITORY_URL is empty", file=sys.stderr)
            sys.exit(1)

          base_url = f"{repo_url}/ch/so/agi"

          def auth_headers():
            if username and password:
              token = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")
              return {"Authorization": f"Basic {token}"}
            return {}

          def http_get(url: str) -> bytes:
            req = urllib.request.Request(url, headers=auth_headers(), method="GET")
            with urllib.request.urlopen(req) as resp:
              if resp.status != 200:
                raise RuntimeError(f"GET {url} returned HTTP {resp.status}")
              return resp.read()

          def http_head(url: str):
            req = urllib.request.Request(url, headers=auth_headers(), method="HEAD")
            with urllib.request.urlopen(req) as resp:
              if resp.status != 200:
                raise RuntimeError(f"HEAD {url} returned HTTP {resp.status}")
              return resp.headers

          def resolve_snapshot_value(artifact_id, classifier):
            metadata_url = f"{base_url}/{artifact_id}/{version}/maven-metadata.xml"
            metadata_bytes = http_get(metadata_url)
            root = ET.fromstring(metadata_bytes)

            versioning = root.find("versioning")
            if versioning is None:
              raise RuntimeError(f"Missing <versioning> in {metadata_url}")

            snapshot_versions = versioning.find("snapshotVersions")
            if snapshot_versions is not None:
              for sv in snapshot_versions.findall("snapshotVersion"):
                ext = (sv.findtext("extension") or "").strip()
                cls = (sv.findtext("classifier") or "").strip()
                value = (sv.findtext("value") or "").strip()
                if ext != "jar":
                  continue
                if (classifier or "") != cls:
                  continue
                if value:
                  return value

            snapshot = versioning.find("snapshot")
            if snapshot is None:
              raise RuntimeError(f"Missing snapshot info in {metadata_url}")
            ts = (snapshot.findtext("timestamp") or "").strip()
            bn = (snapshot.findtext("buildNumber") or "").strip()
            if not ts or not bn:
              raise RuntimeError(f"Incomplete snapshot timestamp/buildNumber in {metadata_url}")
            return version.replace("-SNAPSHOT", f"-{ts}-{bn}")

          def resolve_remote_file(artifact_id, classifier):
            resolved_version = resolve_snapshot_value(artifact_id, classifier) if version.endswith("-SNAPSHOT") else version
            suffix = f"-{classifier}" if classifier else ""
            filename = f"{artifact_id}-{resolved_version}{suffix}.jar"
            return f"{base_url}/{artifact_id}/{version}/{filename}"

          classifiers = [
            "linux-x86_64",
            "linux-aarch64",
            "osx-x86_64",
            "osx-aarch64",
            "windows-x86_64",
          ]
          default_min_size = 100 * 1024 * 1024
          windows_min_size = 30 * 1024 * 1024

          def min_size_for_classifier(classifier):
            if classifier and classifier.endswith("windows-x86_64"):
              return windows_min_size
            return default_min_size

          checks = []
          core_local = pathlib.Path(f"gdal-ffm-core/build/libs/gdal-ffm-core-{version}.jar")
          checks.append(("gdal-ffm-core", None, core_local))
          for classifier in classifiers:
            checks.append(("gdal-ffm-natives", f"natives-{classifier}", pathlib.Path(f"gdal-ffm-natives/build/libs/gdal-ffm-natives-{version}-natives-{classifier}.jar")))
            checks.append(("gdal-ffm-natives-swiss", f"natives-{classifier}", pathlib.Path(f"gdal-ffm-natives/build/libs/gdal-ffm-natives-swiss-{version}-natives-{classifier}.jar")))

          for artifact_id, classifier, local_path in checks:
            if not local_path.is_file():
              raise RuntimeError(f"Local artifact missing: {local_path}")
            local_bytes = local_path.read_bytes()
            local_size = len(local_bytes)
            if artifact_id.startswith("gdal-ffm-natives"):
              min_size = min_size_for_classifier(classifier)
              if local_size < min_size:
                raise RuntimeError(f"Local native artifact too small: {local_path} ({local_size} bytes, expected >= {min_size})")

            local_sha = hashlib.sha256(local_bytes).hexdigest()
            remote_jar_url = resolve_remote_file(artifact_id, classifier)
            headers = http_head(remote_jar_url)
            content_length = headers.get("Content-Length")
            if content_length is None:
              raise RuntimeError(f"Missing Content-Length for {remote_jar_url}")
            remote_size = int(content_length)
            if remote_size != local_size:
              raise RuntimeError(f"Size mismatch for {remote_jar_url}: remote={remote_size}, local={local_size}")

            remote_sha_url = f"{remote_jar_url}.sha256"
            remote_sha = http_get(remote_sha_url).decode("utf-8").strip().split()[0]
            if remote_sha != local_sha:
              raise RuntimeError(f"SHA mismatch for {remote_jar_url}: remote={remote_sha}, local={local_sha}")

            print(f"Verified {remote_jar_url} ({local_size} bytes)")

          print("Remote publish verification passed.")
          PY
